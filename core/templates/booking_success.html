<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Booking Confirmed - Aurora Care</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13131a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a24; border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 48px; text-align: center; max-width: 420px; width: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:64px;margin-bottom:24px;">✅</div>
    <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:12px;">Booking Confirmed!</h1>
    <p style="color:rgba(255,255,255,0.45);font-size:15px;margin-bottom:32px;">Your appointment has been booked successfully. We'll be in touch soon.</p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <a href="/my-bookings/" style="background:#e8442a;color:white;padding:14px;border-radius:10px;font-weight:700;text-decoration:none;display:block;">View My Bookings →</a>
      <a href="/" style="background:rgba(255,255,255,0.06);color:white;padding:14px;border-radius:10px;font-weight:700;text-decoration:none;display:block;">Back to Home</a>
    </div>
  </div>
</body>
</html>
