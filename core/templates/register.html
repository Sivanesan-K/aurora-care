<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register - Aurora Care</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Caveat:wght@700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13131a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a24; border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 48px; width: 100%; max-width: 420px; }
    input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px 16px; color: white; font-size: 15px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #e8442a; }
    button { width: 100%; background: #e8442a; color: white; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }
    .error { background: rgba(232,68,42,0.15); color: #e8442a; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:48px;height:48px;background:#e8442a;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <span style="font-weight:900;font-size:22px;">A</span>
      </div>
      <h1 style="font-size:1.8rem;font-weight:900;">Create account</h1>
      <p style="color:rgba(255,255,255,0.4);font-size:14px;margin-top:8px;">Join Aurora Care today</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required/>
      <input type="password" name="password" placeholder="Password" required/>
      <button type="submit">Create Account →</button>
    </form>

    <p style="text-align:center;margin-top:20px;color:rgba(255,255,255,0.4);font-size:14px;">
      Already have an account? <a href="/login/" style="color:#e8442a;text-decoration:none;font-weight:600;">Sign in</a>
    </p>
  </div>
</body>
</html>
